# shamelessly copied from: 
# https://github.com/flathub/io.emeric.watchflower/blob/master/io.emeric.watchflower.yml
name: qt6.5
cleanup:
  - /bin/__pypache__
  - /bin/rst*
  - /include
  - /lib/cmake
  - /lib/cups
  - /lib/pkgconfig
  - /lib/python*
  - /share/doc
  - /share/man
  - /share/zsh
  - /src
  - '*.a'
  - '*.la'

modules:
  - name: qt-base
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DQT_BUILD_EXAMPLES=OFF
      - -DQT_BUILD_TESTS=OFF
    sources:
      - type: archive
        url: https://download.qt.io/archive/qt/6.5/6.5.8/src/submodules/qtbase-everywhere-opensource-src-6.5.8.tar.xz
        sha256: 5d35f8f37dfb3dff387cce31725b3a363894e3b6ea9d86aa54d9e7fd34e1b888
    cleanup:
      - /bin

  - name: qt-tools
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_PREFIX_PATH=/app
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DQT_BUILD_EXAMPLES=OFF
      - -DQT_BUILD_TESTS=OFF
    sources:
      - type: archive
        url: https://download.qt.io/archive/qt/6.5/6.5.8/src/submodules/qttools-everywhere-opensource-src-6.5.8.tar.xz
        sha256: 1c99dd8d3fd4044866a2d3d569ccd08e25ba28261d494f58b464fcfc18b719a8

  - name: qt-shadertools
